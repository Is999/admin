name: admin-integration

services:
  mysql:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: password
      MYSQL_DATABASE: admin
      TZ: Asia/Shanghai
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_0900_ai_ci
    ports:
      - "3310:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-ppassword"]
      interval: 5s
      timeout: 3s
      retries: 20

  redis:
    image: redis:8.2.7-alpine
    command: ["redis-server", "--appendonly", "no", "--save", ""]
    ports:
      - "127.0.0.1:6390:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 2s
      timeout: 2s
      retries: 20

  redis-cluster-1:
    image: redis:8.2.7-alpine
    command:
      - redis-server
      - --port
      - "7001"
      - --cluster-enabled
      - "yes"
      - --cluster-config-file
      - nodes.conf
      - --cluster-node-timeout
      - "5000"
      - --cluster-announce-hostname
      - redis-cluster-1
      - --cluster-preferred-endpoint-type
      - hostname
      - --appendonly
      - "no"
      - --save
      - ""
    ports:
      - "127.0.0.1:6391:7001"
    healthcheck:
      test: ["CMD", "redis-cli", "-p", "7001", "ping"]
      interval: 2s
      timeout: 2s
      retries: 20

  redis-cluster-2:
    image: redis:8.2.7-alpine
    command:
      - redis-server
      - --port
      - "7002"
      - --cluster-enabled
      - "yes"
      - --cluster-config-file
      - nodes.conf
      - --cluster-node-timeout
      - "5000"
      - --cluster-announce-hostname
      - redis-cluster-2
      - --cluster-preferred-endpoint-type
      - hostname
      - --appendonly
      - "no"
      - --save
      - ""
    ports:
      - "127.0.0.1:6392:7002"
    healthcheck:
      test: ["CMD", "redis-cli", "-p", "7002", "ping"]
      interval: 2s
      timeout: 2s
      retries: 20

  redis-cluster-3:
    image: redis:8.2.7-alpine
    command:
      - redis-server
      - --port
      - "7003"
      - --cluster-enabled
      - "yes"
      - --cluster-config-file
      - nodes.conf
      - --cluster-node-timeout
      - "5000"
      - --cluster-announce-hostname
      - redis-cluster-3
      - --cluster-preferred-endpoint-type
      - hostname
      - --appendonly
      - "no"
      - --save
      - ""
    ports:
      - "127.0.0.1:6393:7003"
    healthcheck:
      test: ["CMD", "redis-cli", "-p", "7003", "ping"]
      interval: 2s
      timeout: 2s
      retries: 20

  redis-cluster-init:
    image: redis:8.2.7-alpine
    profiles: ["setup"]
    command:
      - /bin/sh
      - -ec
      - |
        if redis-cli -h redis-cluster-1 -p 7001 cluster info | grep -q 'cluster_state:ok'; then
          exit 0
        fi
        redis-cli --cluster create redis-cluster-1:7001 redis-cluster-2:7002 redis-cluster-3:7003 --cluster-replicas 0 --cluster-yes
