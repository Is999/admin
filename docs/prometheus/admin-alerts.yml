groups:
  - name: admin
    rules:
      - alert: AdminCollectorLeaseRenewFailed
        expr: sum by (lease) (rate(admin_collector_lease_renew_total{result="failed"}[5m])) > 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "admin Collector lease renewal failed"
          description: "Collector {{ $labels.lease }} ownership renewal is failing; processors are cancelled and wait for safe replay."

      - alert: AdminCollectorProcessorFailed
        expr: sum by (biz_type) (rate(admin_collector_processor_events_total{result!="success"}[5m])) > 0
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "admin Collector Processor failed"
          description: "Collector biz_type={{ $labels.biz_type }} has failed processor events in the last 10 minutes."

      - alert: AdminCollectorProcessorHighLatency
        expr: histogram_quantile(0.95, sum by (le, biz_type) (rate(admin_collector_processor_batch_duration_seconds_bucket[5m]))) > 5
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "admin Collector Processor latency is high"
          description: "Collector biz_type={{ $labels.biz_type }} P95 batch duration is above 5 seconds."

      - alert: AdminCollectorKafkaPublishFailed
        expr: sum(rate(admin_collector_kafka_publish_events_total{result!="success"}[5m])) > 0
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "admin Collector Kafka publish failed"
          description: "Collector Kafka publish has failures in the last 5 minutes. Enqueue callers will receive errors."

      - alert: AdminCollectorFailurePersistSpike
        expr: sum by (state) (rate(admin_collector_failure_persist_events_total[5m])) > 10
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "admin Collector failure ledger persist spike"
          description: "Collector state={{ $labels.state }} is writing more than 10 failure events per second."

      - alert: AdminIDGenerateFailed
        expr: sum by (job, instance, biz_type, strategy) (rate(admin_idgen_generated_total{result!="success"}[5m])) > 0
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "admin ID generation failed"
          description: "instance={{ $labels.instance }} ID biz_type={{ $labels.biz_type }} strategy={{ $labels.strategy }} has generation failures."

      - alert: AdminIDSegmentRemainingLow
        expr: (admin_idgen_segment_remaining < 100) and on (job, instance, biz_type) (sum by (job, instance, biz_type) (rate(admin_idgen_generated_total{strategy="segment",result="success"}[10m])) > 0)
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "admin ID Segment local range is low"
          description: "instance={{ $labels.instance }} ID Segment biz_type={{ $labels.biz_type }} local range is below 100 while still generating IDs."

      - alert: AdminSnowflakeLeaseLost
        expr: sum by (job, instance, biz_type, event) (rate(admin_idgen_snowflake_lease_events_total{event=~"lost|renew_timeout"}[5m])) > 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "admin Snowflake lease lost"
          description: "instance={{ $labels.instance }} Snowflake biz_type={{ $labels.biz_type }} event={{ $labels.event }} detected."
