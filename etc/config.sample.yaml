# admin 生产配置模板。保留占位密钥时会启动失败，部署前必须替换。

# 服务名称，用于日志、监控和服务标识。
Name: admin
# HTTP 服务监听地址。
Host: 0.0.0.0
# HTTP 服务监听端口。
Port: 8899
# 服务环境：dev / test / rt / pre / pro。
Mode: pro
# HTTP 接口统一响应超时，单位毫秒。
Timeout: 100000
# HTTP 请求体最大字节数。
# 50MB，避免上传分片被 413 拦截。
MaxBytes: 52428800

# 启动模式位掩码：1=api，2=worker，4=scheduler，可组合。
run_mode: 7

# 站点/应用 ID，例如 1。
app_id: "1"
# 全局应用密钥；生产环境请替换为强随机字符串。
app_key: "replace-with-strong-app-key"
# 可信反向代理 IP/CIDR；空列表仅信任本机回环代理，生产按 LB/Ingress 实际网段收窄配置。
trusted_proxies: []

# 基于 github.com/bwmarrin/snowflake 的分布式雪花 ID；多实例通过 Redis 租约自动分配 node_id。
snowflake:
  # Redis node_id 租约配置；生产多实例建议开启。
  redis:
    # 是否启用 Redis 租约自动分配 node_id。
    enabled: true
    # node_id 租约作用域；同一套 admin/api 部署必须一致。
    scope: "main"
    # node_id 租约 TTL，单位秒。
    lease_seconds: 120 # 允许 10-86400 秒。
    # node_id 租约续期间隔，单位秒，必须小于 lease_seconds 的一半。
    renew_interval_seconds: 30
    # 按业务 namespace 限制可竞争 node_id 池大小；未配置时使用完整 0-1023。
    namespaces:
      # 用户 ID 生成统一限制为 10 个 node_id；api/admin 写同一用户表必须一致。
      user:
        # 当前 namespace 可竞争的 node_id 数量，取值 1-1024；0 表示完整池。
        node_count: 10
  # 高吞吐业务可按 namespace 启用 Redis Segment 本地号段；默认关闭，普通业务继续走雪花。
  segment:
    # 是否启用 Redis Segment 本地号段策略。
    enabled: false
    # Segment 高水位作用域，默认与 snowflake.redis.scope 保持一致。
    scope: "main"
    # Redis 申请号段超时时间，单位秒。
    allocate_timeout_seconds: 2
    # 按业务 namespace 配置号段策略；空对象表示未启用具体业务。
    namespaces: {}
    # 示例：
    # namespaces:
    #   recharge.order:
    #     # 是否让该业务 namespace 使用 Redis Segment。
    #     enabled: true
    #     # 每次从 Redis 申请的号段长度。
    #     step: 10000
    #     # 本地剩余号段低于该阈值时预取下一段。
    #     prefetch_threshold: 2000
    #     # Redis 高水位初始化值；0 表示首个 ID 从 1 开始。
    #     start: 0

# 业务用户写入路由；提升前必须完成联系方式安全字段、user_identity_* 回填、目标表创建和多实例同步重启。
user:
  # 新增业务用户默认物理表数量，仅支持 1/2/4/8/16/32/64/128/256/512/1024。
  route_shard_count: 1
  # 用户列表导出单个 Excel 文件最大行数，超过后按编号拆分多个文件。
  export_split_rows: 500000

# JWT 密钥，请替换为强随机字符串。
jwt_secret: "replace-with-strong-secret"
# JWT 过期时间，单位秒。
jwt_expires_in: 86400

# 后台接口安全配置。
# AppID 命中 app_id 时使用本地密钥，否则回源表和缓存。
security:
  # 当前 app_id 的秘钥路由和版本材料配置。
  secret_key:
    # 签名验签状态：1启用，0停用；与加密解密开关独立。
    sign_status: 1
    # 加密解密状态：1启用，0停用；与签名验签开关独立。
    crypto_status: 1
    # 密钥版本，对应 X-Key-Version。
    key_version: "v1"
    # AES KEY 文件路径，生产环境不要在 YAML 内联密钥材料。
    aes_key_ref: "/etc/admin/keys/1/v1/aes_key.txt"
    # AES IV 文件绝对路径。
    aes_iv_ref: "/etc/admin/keys/1/v1/aes_iv.txt"
    # 客户端 RSA 公钥路径。
    rsa_public_key_user_ref: "/etc/admin/keys/1/v1/user_public.pem"
    # 服务端 RSA 私钥路径。
    rsa_private_key_server_ref: "/etc/admin/keys/1/v1/server_private.pem"

# 配置热加载；只刷新运行期配置，不重建基础设施连接。
hot_reload:
  # 是否启用配置热加载。
  enabled: true
  # 配置文件轮询间隔，单位秒。
  check_interval_seconds: 5

# 外部运行期配置文件，参与热加载。
config_files:
  # 运行期配置文件路径。
  runtime: "config.d/runtime.yaml"

# 运行期大列表配置来源；本样例显式走 database，由运行配置发布快照接管周期任务和归档任务。
runtime_config:
  # database=使用发布快照覆盖周期任务和归档任务；首次无 active release 时会导入当前运行期文件作为初始版本。
  source: "database"
  # DB 模式只轮询版本状态，版本变化才读取发布快照。
  poll_interval_seconds: 30

# 前台 API 接入配置；用户表由 admin 直连 DB 管理，运行态缓存/会话同步才调用 API 内网接口。
api_service:
  # API 内网地址，仅 admin 后端调用。
  internal_base_url: "http://127.0.0.1:8890"
  # API ops.config_reload_token 对应的运维令牌，也是 API 内网 HMAC 密钥。
  ops_token: ""
  # API 内网调用超时秒数。
  timeout_seconds: 5

# 本地 IP 归属地解析；IPv4/IPv6 XDB 会完整读入内存且合计上限 128 MiB，替换后需滚动重启实例。
ip_region:
  # 是否启用；启用后至少配置一个 XDB 文件，路径或文件无效会启动失败。
  enabled: false
  # IPv4 XDB 文件路径。
  ipv4_xdb_path: "/data/admin/ip2region/ip2region_v4.xdb"
  # IPv6 XDB 文件路径；不需要 IPv6 时留空。
  ipv6_xdb_path: ""

# 文件存储为启动期配置；任一字段变更后需重启，热加载不会切换当前实例。
file_storage:
  # 存储类型：local | s3。
  type: "local"
  # 默认上传模式：server=服务端中转，direct=S3前端直传。
  upload_mode: "server"
  # 本地文件存储配置。
  local:
    # 本地文件根目录；为空时回退到系统临时目录。
    root_dir: "./data/storage"
    # 本地公开域名。
    domain: ""
  # S3 / 对象存储配置。
  s3:
    # 是否启用 S3。
    enabled: false
    # S3 对象 key 前缀。
    path_prefix: ""
    # Bucket 名称。
    bucket: ""
    # 区域。
    region: "ap-southeast-1"
    # AccessKey。
    access_key: ""
    # SecretKey。
    secret_key: ""
    # 自定义访问域名。
    domain: ""
    # 自定义 Endpoint；原生 AWS 可留空。
    endpoint: ""
    # 是否启用 path-style。
    use_path_style: false
    # 直传预签名有效期，单位秒。
    presign_expire_seconds: 900
  # 病毒扫描配置。
  virus_scanner:
    # 扫描器名称；noop 表示不扫描，clamav 表示启用 ClamAV。
    name: "noop"
    # clamdscan 命令路径；仅 clamav 生效，空值从 PATH 查找。
    command: "clamdscan"
    # clamd 配置文件路径；空值使用 clamdscan 默认配置。
    config_file: ""
    # 单文件扫描超时秒数；<=0 时默认 120 秒。
    timeout_seconds: 120
  # 断点续传会话配置。
  upload_session:
    # 断点续传本地临时根目录；为空时回退到系统临时目录。
    root_dir: ""
    # 上传会话保留时间，单位秒；<=0 时默认 24 小时。
    ttl_seconds: 86400

# 日志输出配置。
# `mode=file` 时日志写入 `path` 目录。
log:
  # 日志级别：debug / info / warn / error。
  level: debug
  # 输出模式：console / file。
  mode: file
  # 日志文件目录。
  path: logs
  # 编码格式：plain / json。
  encoding: plain
  # 切割策略：size / time。
  rotation: size
  # 单个日志文件最大体积，单位 MB。
  max_size: 100
  # 最大保留归档数量。
  max_backups: 7
  # 日志保留天数。
  keep_days: 14
  # 是否压缩归档日志。
  compress: true

# MySQL 主库配置。
# 默认所有业务表使用该连接。
mysql:
  # 主库 DSN。
  write_data_source: "user:password@tcp(127.0.0.1:3306)/admin?charset=utf8mb4&parseTime=true&loc=Local"
  # 读库 DSN 列表；不需要读写分离时留空。
  read_data_sources: []
  # 最大打开连接数。
  max_open_conns: 20
  # 最大空闲连接数。
  max_idle_conns: 10
  # 单个连接最大存活时间，单位秒。
  conn_max_lifetime: 300
  # 是否开启 SQL 调试日志。
  debug: false

# 命名扩展库示例；默认不配置。
# site_mysql:
#   api:
#     write_data_source: "user:password@tcp(127.0.0.1:3306)/api?charset=utf8mb4&parseTime=true&loc=Local"
#     read_data_sources: []
#   archive:
#     write_data_source: "user:password@tcp(127.0.0.1:3306)/admin_archive"
#     read_data_sources: []

# Redis 配置。
# 单机填 1 个地址；集群填多个地址。
# 容器地址不可直连时配置 addr_map。
redis:
  # Redis 模式：single=单节点，cluster=集群。
  type: "cluster"
  # Redis 节点地址列表；单机填 1 个，集群可填多个。
  addrs:
    - "127.0.0.1:7001"
    - "127.0.0.1:7002"
    - "127.0.0.1:7003"
    - "127.0.0.1:7004"
    - "127.0.0.1:7005"
    - "127.0.0.1:7006"
  # Redis Cluster 地址改写示例。
  # addr_map:
  #   redis-cluster-7001: "127.0.0.1"
  # Redis 认证密码；无密码可留空。
  password: ""
  # Redis DB 编号；Cluster 模式通常固定为 0。
  db: 0
  # Redis 连接池大小。
  pool_size: 20
  # 是否启用 TLS。
  tls: false
  # 是否跳过 TLS 证书校验；仅测试使用。
  tls_insecure_skip_verify: false

# Kafka 公共配置。
# Collector 未配置 broker、批次和写超时时会继承这里。
kafka:
  # 是否启用 Kafka 生产者。
  enabled: true
  # Kafka broker 地址列表。
  brokers:
    - "127.0.0.1:9092"
  # 单批次最大发送消息数。
  batch_size: 500
  # 写超时时间，单位秒。
  write_timeout: 10
  # 按业务划分的 Topic。
  topics:
    # 用户标签事件 Topic。
    user_tag: "203_user_tag_event"

# 通用收集器；正常链路只走 Kafka，DB 只保存失败账本。
# 批次按压测调整；Processor 受超时和自动续租保护。
collector:
  # 是否启用通用收集器。
  enabled: true
  # Kafka 正常链路配置。
  kafka:
    # broker、写入批次和写超时默认继承顶层 kafka。
    # Kafka producer 写入批次大小，不表示业务 Processor 批量触发规则。
    write_batch_size: 500
    # Kafka producer 写入批次等待时间，单位毫秒。
    write_batch_wait_milliseconds: 20
    # Kafka 读超时时间，单位秒。
    read_timeout: 10
  # 未单独配置 bizType 时的默认任务策略。
  default_task:
    # 默认 Kafka Topic；具体任务建议按 bizType 单独配置。
    topic: "admin_collector_events"
    # 默认 Kafka 消费组；同 Topic 下所有任务必须使用同一个 group_id。
    group_id: "admin_collector"
    # 同 bizType 最大聚合条数。
    batch_size: 500
    # 同 bizType 未满批时最大等待时间，单位毫秒。
    batch_wait_milliseconds: 2000
    # Processor 单批执行超时，单位秒。
    processor_timeout_seconds: 300
  # Redis 单任务 EventID 幂等去重配置。
  idempotency:
    # 默认是否启用 Redis 去重；具体任务可通过 tasks.<bizType>.idempotency_enabled 覆盖，同 bizType 内按 EventID 去重。
    enabled: false
    # 成功和失败终态去重保留时间，单位秒。
    ttl_seconds: 3600
    # 处理中占用租约时间，单位秒；Worker 异常退出后到期允许 Kafka 重投。
    processing_ttl_seconds: 600
    # 单次 Redis Pipeline 最大命令数，兼容单节点和 Cluster，避免大批次拖慢 Redis。
    pipeline_batch_size: 200
  # 失败账本重试配置，仅处理 Kafka 消费处理失败后的事件。
  failure_retry:
    # 单轮领取失败事件上限。
    runner_batch_size: 500
    # 失败重试轮询间隔，单位秒。
    runner_interval_seconds: 1
    # running 失败事件租约时间，单位秒。
    running_lease_seconds: 600
    # 最大失败重试次数。
    max_retry_times: 8
  # 按 bizType 扩展任务配置；key 必须等于 Event.BizType。
  tasks:
    # 管理员审计日志按 200 条或 3 秒触发一次批量入库。
    admin_log.audit:
      # Kafka Topic。
      topic: "admin_collector_admin_log_events"
      # Kafka 消费组；同 Topic 下任务必须保持一致。
      group_id: "admin_collector_admin_log"
      # 同 bizType 最大聚合条数。
      batch_size: 200
      # 同 bizType 未满批时最大等待时间，单位毫秒。
      batch_wait_milliseconds: 3000
      # 是否覆盖全局 Redis EventID 去重开关。
      idempotency_enabled: true
    # 前台 API 认证风控事件按 500 条或 2 秒触发一次指标聚合。
    auth.security:
      # Kafka Topic。
      topic: "api_collector_auth_security_events"
      # Kafka 消费组；同 Topic 下任务必须保持一致。
      group_id: "admin_collector_auth_security"
      # 同 bizType 最大聚合条数。
      batch_size: 500
      # 同 bizType 未满批时最大等待时间，单位毫秒。
      batch_wait_milliseconds: 2000
      # 是否覆盖全局 Redis EventID 去重开关。
      idempotency_enabled: true

# Debezium CDC 消费器，仅 worker 模式启动。
cdc:
  # 是否启用。
  enabled: false
  # Kafka broker 地址；为空继承 kafka.brokers。
  brokers: []
  # 消费组 ID。
  group_id: "admin_cdc"
  # 消费者名称。
  consumer_name: "admin-cdc"
  # 读取超时秒数。
  read_timeout_seconds: 10
  # 失败重试间隔秒数。
  retry_backoff_seconds: 1
  # 单条消息最大失败次数。
  max_retry_times: 8
  # 死信 Topic；为空时失败消息不提交。
  dead_letter_topic: "admin_cdc_dead_letter"
  # Topic 规则。
  topics:
    # 是否启用 admin_log 操作日志 Topic 规则。
    - enabled: false
      # Debezium Topic 名称。
      topic: "dnmp-admin.admin.admin_log"
      # 业务表名，用于路由到对应处理器。
      table: "admin.admin_log"

# 任务系统与调度器配置。
# 角色由 -mode 位掩码控制：1=api，2=worker，4=scheduler。
task:
  # 是否启用任务系统。
  enabled: true
  # 默认投递队列名。
  default_queue: "default"
  # Worker 并发数。
  concurrency: 16
  # 是否启用严格优先级消费。
  strict_priority: false
  # 队列权重配置。
  queues:
    # 高优先级队列权重。
    critical: 6
    # 默认队列权重。
    default: 3
    # 运维 / 后台任务队列权重。
    maintenance: 1
  # 任务专用 Redis；不配则复用全局 redis。
  redis:
    # Redis 模式：single=单节点，cluster=集群。
    type: "single"
    # 任务 Redis 地址列表。
    addrs:
      - "127.0.0.1:6380"
    # 任务 Redis 密码。
    password: ""
    # 任务 Redis DB 编号。
    db: 0
    # 任务 Redis 连接池大小。
    pool_size: 20
    # 是否启用 TLS。
    tls: false
    # 是否跳过 TLS 证书校验。
    tls_insecure_skip_verify: false
  # 默认重试次数。
  default_retry: 3
  # 默认任务超时时间，单位秒。
  default_timeout_seconds: 120
  # 默认任务唯一键 TTL，单位秒。
  default_unique_ttl_seconds: 60
  # 归档失败任务保留时长，单位秒。
  archived_retention_seconds: 604800
  # Worker 优雅退出等待时间，单位秒。
  shutdown_timeout_seconds: 15
  # 普通任务轮询间隔，单位秒。
  task_check_seconds: 1
  # 延迟任务检查间隔，单位秒。
  delayed_task_check_seconds: 5
  # 任务分组聚合等待窗口，单位秒。
  group_grace_period_seconds: 5
  # 任务分组聚合最大等待时间，单位秒。
  group_max_delay_seconds: 20
  # 单次聚合最大任务数。
  group_max_size: 100
  # 调度器配置。
  scheduler:
    # 是否启用调度器 leader。
    enabled: true
    # 调度器 leader 锁 key。
    lease_key: "task:scheduler:leader"
    # leader 锁过期时间，单位秒。
    lease_ttl_seconds: 30
    # leader 续约间隔，单位秒。
    renew_interval_seconds: 10
    # 周期任务配置同步间隔，单位秒。
    sync_interval_seconds: 60
    # 调度器心跳间隔，单位秒。
    heartbeat_interval_seconds: 10
    # 周期投递积压上限；0 表示关闭。
    max_queue_backlog: 0

# 通用归档配置。
# 单表策略见运行期 archive_jobs。
archive:
  # 是否启用通用归档模块。
  enabled: true
  # 安全时间延迟，单位分钟。
  safe_delay_minutes: 10
  # 归档规划锁 TTL，单位秒。
  lock_ttl_seconds: 30
  # 区间租约 TTL，单位秒。
  lease_ttl_seconds: 120
  # 单次归档工作流允许并发执行的 job 数。
  max_concurrent_jobs: 2
  # 默认单批归档条数。
  default_batch_size: 5000
  # 默认单批删除条数。
  default_delete_batch_size: 5000
  # 批次间隔，单位毫秒。
  batch_delay_milliseconds: 200
  # 默认最大历史表数量。
  default_max_history_tables: 6

# 可观测性配置。
# trace_enabled=true 时上报 OTLP。
# go-zero 内置 Telemetry；默认交给 observability 接管。
Telemetry:
  # 是否关闭 go-zero 内置 Telemetry，避免与 observability 重复上报。
  Disabled: true
# 日志、链路追踪和审计相关可观测性配置。
observability:
  # 可观测性服务名。
  service_name: "admin"
  # 是否启用 trace 上报。
  trace_enabled: true
  # OTLP 上报协议：grpc/http-protobuf；为空默认 grpc。
  otlp_protocol: "grpc"
  # OTLP 上报地址。
  otlp_endpoint: "127.0.0.1:4317"
  # 是否使用明文连接 OTLP。
  otlp_insecure: true
  # trace 采样率，0~1。
  sample_ratio: 1
  # 慢 SQL 阈值，单位毫秒。
  slow_sql_ms: 2000
  # 慢 Redis 阈值，单位毫秒。
  redis_slow_ms: 200
  # 审计日志请求体最大保留字节数。
  log_body_max_bytes: 8192

# 外部告警配置。
alert:
  # Lark 群机器人告警。
  lark:
    # 是否启用 Lark 告警。
    enabled: false
    # Lark webhook URL；为空时读取 webhook_url_ref。
    webhook_url: ""
    # Lark webhook URL 文件路径。
    webhook_url_ref: ""
    # Lark 签名密钥；为空时读取 secret_ref。
    secret: ""
    # Lark 签名密钥文件路径。
    secret_ref: ""
    # HTTP 请求超时，单位秒。
    timeout_seconds: 5
    # 是否在告警中 @所有人。
    at_all: false
    # 错误摘要最大字节数。
    max_error_bytes: 800
